<html lang="en">
  <head>
    <title>Fairy Chess</title>
    <script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta16/dist/js/tabler.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta16/dist/css/tabler.min.css">
    <!-- CSS files -->
    <link href="./dist/css/tabler.min.css?1668288743" rel="stylesheet"/>
    <link href="./dist/css/tabler-flags.min.css?1668288743" rel="stylesheet"/>
    <link href="./dist/css/tabler-payments.min.css?1668288743" rel="stylesheet"/>
    <link href="./dist/css/tabler-vendors.min.css?1668288743" rel="stylesheet"/>
    <link href="./dist/css/demo.min.css?1668288743" rel="stylesheet"/>
    <style>
      @import url('https://rsms.me/inter/inter.css');
      :root {
      	--tblr-font-sans-serif: Inter, -apple-system, BlinkMacSystemFont, San Francisco, Segoe UI, Roboto, Helvetica Neue, sans-serif;
      }
    </style>
  </head>
  <body  class=" border-top-wide border-primary d-flex flex-column">
    <script src="./dist/js/demo-theme.min.js?1668288743"></script>
    <div class="page page-center">
      <div class="container container-tight py-4">
        <div class="text-center mb-4">
          <a href="." class="navbar-brand navbar-brand-autodark"><img src="{{ url_for('static', path='/logo.png') }}" height="200" alt=""></a>
        </div>
        <form class="card card-md" action="{{ url_for('create_user') }}" method="POST" autocomplete="off" novalidate>
          <div class="card-body">
            <h2 class="card-title text-center mb-4">Criar nova conta</h2>
            <div class="mb-3">
              <label class="form-label">Nome</label>
              <input name="name" type="text" class="form-control" placeholder="Enter name">
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input name="username" type="email" class="form-control" placeholder="Enter email">
            </div>
            <div class="mb-3">
              <label class="form-label">Senha</label>
              <div class="input-group input-group-flat">
                <input name="password" type="password" class="form-control"  placeholder="Password"  autocomplete="off">
                <span class="input-group-text">
                  <a href="#" class="link-secondary" title="Show password" data-bs-toggle="tooltip"><!-- Download SVG icon from http://tabler-icons.io/i/eye -->
                    <svg xmlns="http://www.w3.org/2000/svg" class="icon" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><circle cx="12" cy="12" r="2" /><path d="M22 12c-2.667 4.667 -6 7 -10 7s-7.333 -2.333 -10 -7c2.667 -4.667 6 -7 10 -7s7.333 2.333 10 7" /></svg>
                  </a>
                </span>
              </div>
            </div>
            <div class="form-footer">
              <button type="submit" class="btn btn-primary w-100">Criar Conta</button>
            </div>
          </div>
        </form>
        <div class="text-center text-muted mt-3">
          Ja tem uma conta? <a href="{{ url_for('login') }}" tabindex="-1">Login</a>
        </div>
      </div>
    </div>
    <!-- Libs JS -->
    <!-- Tabler Core -->
    <script src="./dist/js/tabler.min.js?1668288743" defer></script>
    <script src="./dist/js/demo.min.js?1668288743" defer></script>
  </body>
</html>
